<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-792K5E73WK"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-792K5E73WK');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle">SOTA-eApps | Links</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* المتغيرات الأساسية للموقع */
        :root {
            --primary: #0ea5e9;
            --secondary: #6366f1;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.65);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --nav-bg: rgba(15, 23, 42, 0.85);
            --hero-bg: radial-gradient(circle at 20% 30%, rgba(14, 165, 233, 0.15) 0%, transparent 40%),
                       radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                       #0f172a;
            --footer-bg: #020617;
            --font-en: 'Poppins', sans-serif;
            --font-ar: 'Cairo', sans-serif;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --primary: #0284c7; 
                --secondary: #4f46e5;
                --bg-color: #f8fafc;
                --card-bg: rgba(255, 255, 255, 0.7);
                --text-main: #0f172a;
                --text-muted: #475569;
                --border-color: rgba(0, 0, 0, 0.05);
                --nav-bg: rgba(255, 255, 255, 0.85);
                --hero-bg: radial-gradient(circle at 20% 30%, rgba(2, 132, 199, 0.1) 0%, transparent 40%),
                           radial-gradient(circle at 80% 80%, rgba(79, 70, 229, 0.1) 0%, transparent 40%),
                           #f1f5f9;
                --footer-bg: #e2e8f0;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg-color);
            background-image: var(--hero-bg);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
            font-family: var(--font-en);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        body[dir="rtl"] { font-family: var(--font-ar); }

        /* Navbar مبسط لصفحة الشركة */
        .navbar { display: flex; justify-content: flex-end; align-items: center; padding: 15px 5%; background: transparent; position: absolute; width: 100%; top: 0; z-index: 1000; }
        .lang-wrapper { background: rgba(14, 165, 233, 0.1); color: var(--primary); padding: 6px 14px; border: 1px solid var(--primary); border-radius: 50px; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: all 0.3s ease; font-size: 13px; backdrop-filter: blur(10px); }
        .lang-wrapper:hover { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3); }
        .lang-spinner { background: transparent; color: inherit; border: none; font-size: 13px; font-weight: 600; cursor: pointer; outline: none; appearance: none; -webkit-appearance: none; padding: 0; }
        .lang-spinner option { background: var(--bg-color); color: var(--text-main); }

        /* حاوية الروابط (Linktree Style) */
        .links-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 20px 60px;
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .company-avatar {
            width: 110px;
            height: 110px;
            border-radius: 30%;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.4);
            margin-bottom: 20px;
            border: 3px solid var(--border-color);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .company-name {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .company-bio {
            color: var(--text-muted);
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 40px;
        }

        /* تصميم أزرار الروابط */
        .section-label {
            width: 100%;
            text-align: start;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 15px;
            padding-inline-start: 10px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 5px;
            margin-top: 15px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 18px 25px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 18px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        .link-card i {
            position: absolute;
            left: 25px; /* في الإنجليزي يسار */
            font-size: 1.5rem;
            color: var(--primary);
            transition: all 0.3s ease;
        }
        
        /* تعديل للأيقونة لو كانت صورة مش FontAwesome */
        .link-card img.custom-icon {
            position: absolute;
            left: 20px;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
            transition: all 0.3s ease;
        }

        html[dir="rtl"] .link-card i,
        html[dir="rtl"] .link-card img.custom-icon {
            left: auto;
            right: 25px; /* في العربي يمين */
        }

        .link-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(14, 165, 233, 0.2);
            color: #fff;
        }

        .link-card:hover i,
        .link-card:hover img.custom-icon {
            transform: scale(1.2);
        }

        /* ألوان مخصصة عند الـ Hover لوسائل التواصل */
        .btn-nestbook:hover { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-color: transparent; }
        .btn-nestbook:hover i { color: #fff; }
        
        .btn-facebook:hover { background: #1877F2; border-color: #1877F2; }
        .btn-facebook:hover i { color: #fff; }
        
        .btn-instagram:hover { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); border-color: transparent; }
        .btn-instagram:hover i { color: #fff; }
        
        .btn-whatsapp:hover { background: #25D366; border-color: #25D366; }
        .btn-whatsapp:hover i { color: #fff; }
        
        .btn-email:hover { background: #EA4335; border-color: #EA4335; }
        .btn-email:hover i { color: #fff; }
        
        .btn-contact:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--primary); color: var(--primary); }

        /* Footer */
        footer { padding: 30px 20px; text-align: center; border-top: 1px solid var(--border-color); width: 100%; }
        .copyright { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0; }

        /* Mobile */
        @media (max-width: 768px) {
            .links-container { padding-top: 70px; }
            .company-name { font-size: 1.8rem; }
            .company-bio { font-size: 1rem; }
            .link-card { padding: 15px 20px; font-size: 1.05rem; }
            .link-card i { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="lang-wrapper">
            <i class="fa-solid fa-globe"></i>
            <select id="langSpinner" class="lang-spinner">
                <option value="en">EN</option>
                <option value="ar">عربي</option>
            </select>
        </div>
    </nav>

    <main class="links-container">
        
        <img src="sota.png" alt="SOTA-eApps Logo" class="company-avatar">
        <h1 class="company-name">SOTA-eApps</h1>
        <p class="company-bio" data-i18n="companyBio">Innovative Mobile & Web Solutions</p>

        <div class="section-label" data-i18n="ourProjects">Our Projects</div>
        
        <a href="https://sota-eapps.github.io/NestBook/index.html" class="link-card btn-nestbook" target="_blank">
            <img src="nestbook.png" alt="NestBook" class="custom-icon">
            <span data-i18n="nestBookLink">NestBook Platform</span>
        </a>

        <div class="section-label" data-i18n="connectWithUs">Connect With Us</div>

        <a href="https://www.facebook.com/share/1AxnB5qd9C/" class="link-card btn-facebook" target="_blank">
            <i class="fa-brands fa-facebook"></i>
            <span data-i18n="facebookLink">Facebook</span>
        </a>

        <a href="https://www.instagram.com/sotaeapps?igsh=MzdvNXdoZWwwd2Ny" class="link-card btn-instagram" target="_blank">
            <i class="fa-brands fa-instagram"></i>
            <span data-i18n="instagramLink">Instagram</span>
        </a>

        <a href="https://wa.me/201285870672" class="link-card btn-whatsapp" target="_blank">
            <i class="fa-brands fa-whatsapp"></i>
            <span data-i18n="whatsappLink">WhatsApp</span>
        </a>

        <a href="mailto:nestbooksupport@gmail.com" class="link-card btn-email">
            <i class="fa-solid fa-envelope"></i>
            <span data-i18n="emailLink">Email Us</span>
        </a>

        <a href="https://sota-eapps.github.io/NestBook/contact.html" class="link-card btn-contact" target="_blank">
            <i class="fa-solid fa-headset"></i>
            <span data-i18n="contactLink">Contact Support Center</span>
        </a>

    </main>

    <footer>
        <p class="copyright">
            <span data-i18n="copyright">&copy; 2026 SOTA-eApps. All rights reserved.</span>
        </p>
    </footer>

    <script>
        const translations = {
            en: {
                pageTitle: "SOTA-eApps | Links",
                companyBio: "Innovative Mobile & Web Solutions",
                ourProjects: "Our Projects",
                nestBookLink: "NestBook Platform",
                connectWithUs: "Connect With Us",
                facebookLink: "Facebook",
                instagramLink: "Instagram",
                whatsappLink: "WhatsApp",
                emailLink: "Email Us",
                contactLink: "Contact Support Center",
                copyright: "© 2026 SOTA-eApps. All rights reserved."
            },
            ar: {
                pageTitle: "SOTA-eApps | روابط",
                companyBio: "حلول برمجية مبتكرة وتطبيقات ذكية",
                ourProjects: "مشاريعنا",
                nestBookLink: "منصة NestBook",
                connectWithUs: "تواصل معنا",
                facebookLink: "فيسبوك",
                instagramLink: "إنستجرام",
                whatsappLink: "واتساب",
                emailLink: "مراسلة عبر البريد",
                contactLink: "مركز الدعم الفني",
                copyright: "© 2026 SOTA-eApps. جميع الحقوق محفوظة."
            }
        };

        const langSpinner = document.getElementById('langSpinner');
        const userLang = navigator.language || navigator.userLanguage;
        let currentLang = localStorage.getItem('appLang') || (userLang.startsWith('ar') ? 'ar' : 'en');
        
        langSpinner.value = currentLang;
        setLanguage(currentLang);

        langSpinner.addEventListener('change', (e) => {
            setLanguage(e.target.value);
        });

        function setLanguage(lang) {
            localStorage.setItem('appLang', lang);
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(translations[lang][key]) {
                    el.innerHTML = translations[lang][key];
                }
            });
            
            document.title = translations[lang].pageTitle;
        }
    </script>
</body>
</html>
